<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page introuvable — estimationcave.com">
    <title>Page introuvable — estimationcave.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bordeaux: #2D1B2E;
            --or: #C5A258;
            --fond: #FAF6F0;
            --texte: #3A3035;
            --texte-light: #6B5F65;
            --border: rgba(45, 27, 46, 0.08);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Inter', -apple-system, sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background-color: var(--fond);
            color: var(--texte);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(250, 246, 240, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .nav-logo {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--bordeaux);
        }

        .nav-logo span { color: var(--or); }

        .btn-primary {
            display: inline-block;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            background: var(--bordeaux);
            color: var(--fond);
            padding: 0.65rem 1.5rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .error-content .btn-primary {
            padding: 1rem 2.4rem;
            font-size: 1rem;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #3D2940;
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(45, 27, 46, 0.2);
        }

        .btn-gold {
            display: inline-block;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.03em;
            background: var(--or);
            color: var(--bordeaux);
            padding: 1rem 2.4rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            background: #D4B76E;
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(197, 162, 88, 0.3);
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8rem 2rem 4rem;
        }

        .error-code {
            font-family: var(--font-display);
            font-size: clamp(5rem, 12vw, 8rem);
            font-weight: 700;
            color: var(--bordeaux);
            line-height: 1;
            opacity: 0.12;
            margin-bottom: -1.5rem;
            position: relative;
            z-index: 0;
        }

        .error-content {
            position: relative;
            z-index: 1;
        }

        .error-content h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 600;
            color: var(--bordeaux);
            margin-bottom: 0.75rem;
        }

        .ornament {
            display: block;
            width: 48px;
            height: 2px;
            background: var(--or);
            margin: 1.25rem auto;
        }

        .error-content p {
            font-size: 1.05rem;
            font-weight: 300;
            color: var(--texte-light);
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .footer-inner {
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
            font-size: 0.82rem;
            color: var(--texte-light);
        }

        .footer-logo {
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--bordeaux);
            font-size: 0.95rem;
        }

        .footer-sep { color: var(--or); opacity: 0.5; }
        .footer-inner a:hover { color: var(--or); }

        @media (max-width: 600px) {
            .nav-inner { padding: 0 1.25rem; height: 64px; }
            .nav-logo { font-size: 1.05rem; }
            .footer-inner { flex-direction: column; gap: 0.5rem; }
            .footer-sep { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">estimation<span>cave</span>.com</a>
            <a href="https://buy.stripe.com/dRm28kc5ffAy5ll8hp4Rq00" target="_blank" rel="noopener" class="btn-gold">Demander un audit</a>
        </div>
    </nav>

    <main>
        <div>
            <div class="error-code">404</div>
            <div class="error-content">
                <h1>Page introuvable</h1>
                <span class="ornament"></span>
                <p>Cette page n'existe pas ou a été déplacée.</p>
                <a href="index.html" class="btn-primary">Retourner à l'accueil</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <span class="footer-logo">estimationcave.com</span>
            <span class="footer-sep">·</span>
            <a href="mailto:contact@estimationcave.com">contact@estimationcave.com</a>
            <span class="footer-sep">·</span>
            <a href="mentions-legales.html">Mentions légales</a>
            <span class="footer-sep">·</span>
            <a href="confidentialite.html">Confidentialité</a>
            <span class="footer-sep">·</span>
            <a href="faq.html">FAQ</a>
            <span class="footer-sep">·</span>
            <a href="blog.html">Blog</a>
        </div>
    </footer>

</body>
</html>
