<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Dashboard leads — estimationcave</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bordeaux:#2D1B2E; --or:#C5A258; --fond:#FAF6F0; --blanc:#fff;
    --texte:#3a2f38; --gris:#8a7d86; --border:#e3d9c4; --border2:#ece3d2;
    --vert:#2e7d52; --rouge:#b42828; --or-pale:#f6efe0;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#f2ece2;color:var(--texte);
    font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;font-size:14px;}
  a{color:var(--bordeaux);}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px;}

  /* ── LOGIN ── */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  #login[hidden]{display:none;}
  .login-card{background:var(--blanc);border:1px solid var(--border);border-top:3px solid var(--or);
    border-radius:10px;padding:32px 30px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(45,27,46,.10);}
  .login-card .marque{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--or);font-weight:600;}
  .login-card h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--bordeaux);margin:6px 0 4px;}
  .login-card p{color:var(--gris);font-size:13px;margin:0 0 20px;}
  .login-card label{display:block;font-size:12px;font-weight:600;color:var(--bordeaux);margin-bottom:6px;}
  .login-card input{width:100%;border:1px solid #d8cfc0;border-radius:8px;padding:11px 12px;font-size:14px;
    font-family:inherit;background:#fffdfa;color:var(--texte);}
  .login-card input:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 3px rgba(197,162,88,.18);}
  .login-card button{margin-top:16px;width:100%;background:var(--bordeaux);color:var(--fond);border:none;
    border-radius:8px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
  .login-card button:hover{background:#3d2740;}
  .login-err{color:var(--rouge);font-size:12.5px;margin-top:12px;min-height:16px;font-weight:500;}

  /* ── APP ── */
  #app[hidden]{display:none;}
  .topbar{background:var(--blanc);border-bottom:3px solid var(--or);}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;padding-top:16px;padding-bottom:16px;gap:12px;flex-wrap:wrap;}
  .topbar .brand .marque{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--or);font-weight:600;}
  .topbar .brand h1{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;color:var(--bordeaux);margin:2px 0 0;}
  .topbar .actions{display:flex;gap:8px;align-items:center;}
  .btn{border:1px solid #d8cfc0;background:var(--blanc);color:var(--bordeaux);border-radius:7px;
    padding:8px 13px;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;}
  .btn:hover{border-color:var(--or);}
  .btn-primary{background:var(--bordeaux);color:var(--fond);border-color:var(--bordeaux);}
  .btn-primary:hover{background:#3d2740;}

  .filters{display:flex;gap:7px;flex-wrap:wrap;padding:18px 0 4px;}
  .chip{border:1px solid var(--border);background:var(--blanc);color:var(--texte);border-radius:20px;
    padding:6px 13px;font-size:12.5px;font-weight:500;cursor:pointer;display:inline-flex;gap:6px;align-items:center;}
  .chip:hover{border-color:var(--or);}
  .chip.active{background:var(--bordeaux);color:var(--fond);border-color:var(--bordeaux);}
  .chip .n{font-size:11px;opacity:.7;font-weight:600;}
  .chip.active .n{opacity:.85;}

  .meta{color:var(--gris);font-size:12px;padding:6px 0 14px;}

  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--blanc);margin-bottom:40px;}
  table{border-collapse:collapse;width:100%;min-width:960px;}
  thead th{text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--or);
    font-weight:600;padding:12px 12px;border-bottom:1px solid var(--border);white-space:nowrap;background:#fbf7ef;}
  tbody td{padding:11px 12px;border-bottom:1px solid var(--border2);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.saved{animation:flash 1.1s ease;}
  @keyframes flash{0%{background:rgba(46,125,82,.16);}100%{background:transparent;}}
  .c-date{color:var(--gris);font-size:12px;white-space:nowrap;}
  .c-bottle strong{color:var(--bordeaux);font-weight:600;display:block;}
  .c-bottle span{color:var(--gris);font-size:12px;}
  .c-email a{color:var(--bordeaux);text-decoration:none;font-size:13px;word-break:break-all;}
  .c-email a:hover{text-decoration:underline;}
  .c-src{font-size:12px;color:var(--texte);white-space:nowrap;}
  .badge{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
  .badge.hot{background:#f7e4c4;color:#8a5a12;}
  .badge.warm{background:var(--or-pale);color:#7a6a3a;}
  .cave-txt{font-size:12px;color:var(--gris);display:block;margin-top:2px;}
  input.f-cote,input.f-notes{border:1px solid #e0d6c6;border-radius:6px;padding:7px 8px;font-size:12.5px;
    font-family:inherit;background:#fffdfa;color:var(--texte);width:100%;}
  input.f-cote{width:78px;text-align:center;}
  input.f-cote:focus,input.f-notes:focus,select.f-statut:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 2px rgba(197,162,88,.16);}
  select.f-statut{border:1px solid #e0d6c6;border-radius:6px;padding:7px 8px;font-size:12.5px;font-family:inherit;
    background:#fffdfa;color:var(--texte);cursor:pointer;}
  .c-notes{min-width:200px;}
  .btn-save{border:1px solid var(--bordeaux);background:var(--bordeaux);color:var(--fond);border-radius:6px;
    padding:7px 12px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;}
  .btn-save:hover{background:#3d2740;}
  .btn-save.ok{background:var(--vert);border-color:var(--vert);}
  .empty{text-align:center;color:var(--gris);padding:60px 20px;font-size:14px;}
  .loading{text-align:center;color:var(--gris);padding:40px;font-size:13px;}
  @media(max-width:600px){.topbar .brand h1{font-size:20px;}}
</style>
</head>
<body>

  <!-- ── LOGIN ── -->
  <div id="login">
    <form class="login-card" id="login-form" autocomplete="off">
      <div class="marque">estimationcave.com</div>
      <h1>Dashboard leads</h1>
      <p>Estimations offertes — accès réservé.</p>
      <label for="token">Mot de passe</label>
      <input type="password" id="token" name="token" autocomplete="current-password" autofocus>
      <button type="submit">Se connecter</button>
      <div class="login-err" id="login-err" role="alert"></div>
    </form>
  </div>

  <!-- ── APP ── -->
  <div id="app" hidden>
    <div class="topbar">
      <div class="wrap">
        <div class="brand">
          <div class="marque">estimationcave.com</div>
          <h1>Leads — estimations offertes</h1>
        </div>
        <div class="actions">
          <button class="btn" id="refresh" type="button">↻ Actualiser</button>
          <button class="btn" id="logout" type="button">Déconnexion</button>
        </div>
      </div>
    </div>

    <div class="wrap">
      <div class="filters" id="filters"></div>
      <div class="meta" id="meta"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Reçu</th><th>Prospect</th><th>Bouteille</th><th>Source</th>
              <th>Cave</th><th>Cote</th><th>Statut</th><th>Notes</th><th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="empty" id="empty" hidden>Aucun lead pour ce filtre.</div>
    </div>
  </div>

<script>
(function(){
  var API = '/api/leads';
  var TKEY = 'ec_admin_token';
  var STATUTS = [
    {v:'a_traiter', l:'À traiter'},
    {v:'repondu',   l:'Répondu'},
    {v:'relance',   l:'Relancé'},
    {v:'converti',  l:'Converti'},
    {v:'perdu',     l:'Perdu'}
  ];
  var all = [];
  var filter = '';

  function token(){ return localStorage.getItem(TKEY) || ''; }
  function headers(){ return { 'Authorization':'Bearer '+token() }; }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function fmtDate(iso){
    if(!iso) return '';
    var d = new Date(iso);
    if(isNaN(d)) return esc(iso);
    return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})+' '+
           d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }
  function sourceLabel(src){
    if(!src) return 'directe';
    if(/gclid|gad_source|gbraid|gadid/i.test(src)) return 'Google Ads';
    try { var u=new URL(src); var p=u.pathname.replace(/^\//,'').replace(/\.html$/,''); return p||u.hostname; }
    catch(_){ return 'lien'; }
  }
  function caveBadge(nb){
    var b='';
    if(nb==='200 et plus') b='<span class="badge hot">🔥 chaud</span>';
    else if(nb==='50 à 200') b='<span class="badge warm">tiède</span>';
    return b + '<span class="cave-txt">'+esc(nb||'—')+'</span>';
  }
  function statutOptions(cur){
    return STATUTS.map(function(s){
      return '<option value="'+s.v+'"'+(s.v===cur?' selected':'')+'>'+s.l+'</option>';
    }).join('');
  }

  function rowHtml(l){
    return '<tr data-id="'+l.id+'">'+
      '<td class="c-date">'+fmtDate(l.created_at)+'</td>'+
      '<td class="c-email"><a href="mailto:'+esc(l.email)+'">'+esc(l.email)+'</a></td>'+
      '<td class="c-bottle"><strong>'+esc(l.domaine||'—')+'</strong><span>'+
        [l.appellation,l.millesime,l.format,l.quantite].filter(Boolean).map(esc).join(' · ')+'</span></td>'+
      '<td class="c-src">'+esc(sourceLabel(l.source_page))+'</td>'+
      '<td class="c-cave">'+caveBadge(l.nb_references)+'</td>'+
      '<td><input type="text" class="f-cote" value="'+esc(l.cote)+'" placeholder="—"></td>'+
      '<td><select class="f-statut">'+statutOptions(l.statut)+'</select></td>'+
      '<td class="c-notes"><input type="text" class="f-notes" value="'+esc(l.notes)+'" placeholder="…"></td>'+
      '<td><button class="btn-save" type="button">Enregistrer</button></td>'+
    '</tr>';
  }

  function render(){
    var list = filter ? all.filter(function(l){return l.statut===filter;}) : all;
    document.getElementById('tbody').innerHTML = list.map(rowHtml).join('');
    document.getElementById('empty').hidden = list.length>0;
    // compteurs par statut
    var counts = {}; all.forEach(function(l){ counts[l.statut]=(counts[l.statut]||0)+1; });
    var chips = '<button class="chip'+(filter===''?' active':'')+'" data-f="">Tous <span class="n">'+all.length+'</span></button>';
    chips += STATUTS.map(function(s){
      return '<button class="chip'+(filter===s.v?' active':'')+'" data-f="'+s.v+'">'+s.l+' <span class="n">'+(counts[s.v]||0)+'</span></button>';
    }).join('');
    document.getElementById('filters').innerHTML = chips;
    document.getElementById('meta').textContent = all.length+' lead'+(all.length>1?'s':'')+' au total';
  }

  function showApp(){ document.getElementById('login').hidden=true; document.getElementById('app').hidden=false; }
  function showLogin(msg){
    document.getElementById('app').hidden=true;
    document.getElementById('login').hidden=false;
    document.getElementById('login-err').textContent = msg||'';
    var t=document.getElementById('token'); if(t){ t.value=''; t.focus(); }
  }

  function load(){
    document.getElementById('tbody').innerHTML='<tr><td colspan="9" class="loading">Chargement…</td></tr>';
    fetch(API,{headers:headers()}).then(function(r){
      if(r.status===401){ localStorage.removeItem(TKEY); showLogin('Mot de passe incorrect.'); return null; }
      return r.json();
    }).then(function(data){
      if(!data) return;
      if(!data.success){ document.getElementById('tbody').innerHTML='<tr><td colspan="9" class="loading">Erreur : '+esc(data.error||'')+'</td></tr>'; return; }
      all = data.leads||[];
      showApp(); render();
    }).catch(function(){
      document.getElementById('tbody').innerHTML='<tr><td colspan="9" class="loading">Connexion impossible.</td></tr>';
    });
  }

  function saveRow(tr, btn){
    var id = tr.getAttribute('data-id');
    var body = {
      id: id,
      statut: tr.querySelector('.f-statut').value,
      cote: tr.querySelector('.f-cote').value,
      notes: tr.querySelector('.f-notes').value
    };
    var orig = btn.textContent; btn.disabled=true; btn.textContent='…';
    fetch(API,{method:'POST',headers:Object.assign({'Content-Type':'application/json'},headers()),body:JSON.stringify(body)})
      .then(function(r){ if(r.status===401){ localStorage.removeItem(TKEY); showLogin('Session expirée.'); return null; } return r.json(); })
      .then(function(data){
        btn.disabled=false;
        if(!data) return;
        if(data.success){
          // maj cache local
          for(var i=0;i<all.length;i++){ if(String(all[i].id)===String(id)){ all[i]=data.lead; break; } }
          btn.textContent='✓ Enregistré'; btn.classList.add('ok'); tr.classList.add('saved');
          setTimeout(function(){ btn.textContent=orig; btn.classList.remove('ok'); tr.classList.remove('saved'); },1400);
          // si un filtre est actif et que le statut ne correspond plus, on rerend
          if(filter && data.lead.statut!==filter){ setTimeout(render,1400); } else { render(); }
        } else { btn.textContent=orig; alert(data.error||'Erreur'); }
      }).catch(function(){ btn.disabled=false; btn.textContent=orig; alert('Connexion impossible.'); });
  }

  // ── événements ──
  document.getElementById('login-form').addEventListener('submit',function(e){
    e.preventDefault();
    var v=document.getElementById('token').value.trim();
    if(!v){ return; }
    localStorage.setItem(TKEY,v);
    load();
  });
  document.getElementById('refresh').addEventListener('click',load);
  document.getElementById('logout').addEventListener('click',function(){ localStorage.removeItem(TKEY); showLogin(''); });
  document.getElementById('filters').addEventListener('click',function(e){
    var c=e.target.closest('.chip'); if(!c) return; filter=c.getAttribute('data-f'); render();
  });
  document.getElementById('tbody').addEventListener('click',function(e){
    var b=e.target.closest('.btn-save'); if(!b) return; saveRow(b.closest('tr'), b);
  });

  // ── démarrage ──
  if(token()) load(); else showLogin('');
})();
</script>
</body>
</html>
